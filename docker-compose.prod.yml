version: '3.8'

services:
  # PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: nyusatsu-db
    environment:
      POSTGRES_USER: nyusatsu
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: nyusatsu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nyusatsu-network
    restart: unless-stopped

  # nyusatsu アプリケーション
  app:
    image: ghcr.io/watchout/nyusatsu:latest
    container_name: nyusatsu-app
    ports:
      - "127.0.0.1:3300:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://nyusatsu:${DB_PASSWORD}@postgres:5432/nyusatsu
      LLM_API_KEY: ${CLAUDE_API_KEY}
      LLM_MODEL: claude-sonnet-4-20250514
      APP_ENV: production
      APP_LOG_LEVEL: INFO
      LLM_DAILY_TOKEN_LIMIT: ${LLM_DAILY_TOKEN_LIMIT:-100000}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - postgres
    networks:
      - nyusatsu-network
    restart: unless-stopped
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  # Watchtower (自動更新)
  watchtower:
    image: containrrr/watchtower
    container_name: nyusatsu-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup nyusatsu-app
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  nyusatsu-network:
    driver: bridge
